server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Static assets — long cache, content-hashed
  location ~* \.(?:css|js|woff2?|ttf|eot|png|jpg|jpeg|gif|webp|svg|ico)$ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
  }

  # API + actuator + swagger → backend (compose service name)
  location /api/      { proxy_pass http://backend:8080; include /etc/nginx/conf.d/proxy.conf; }
  location /actuator/ { proxy_pass http://backend:8080; include /etc/nginx/conf.d/proxy.conf; }
  location /v3/api-docs { proxy_pass http://backend:8080; include /etc/nginx/conf.d/proxy.conf; }
  location /swagger-ui  { proxy_pass http://backend:8080; include /etc/nginx/conf.d/proxy.conf; }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss application/wasm;
  gzip_min_length 1024;
}
