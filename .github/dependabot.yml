version: 2
updates:
  - package-ecosystem: maven
    directory: /backend
    schedule: { interval: weekly, day: monday, time: "06:00", timezone: "Africa/Nouakchott" }
    open-pull-requests-limit: 5
    groups:
      spring:
        patterns: ["org.springframework*", "io.spring*"]

  - package-ecosystem: npm
    directory: /frontend
    schedule: { interval: weekly, day: monday, time: "06:30", timezone: "Africa/Nouakchott" }
    open-pull-requests-limit: 5
    groups:
      angular: { patterns: ["@angular/*"] }
      nx:      { patterns: ["@nx/*", "nx"] }
      primeng: { patterns: ["primeng", "primeicons"] }

  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: monthly }

  - package-ecosystem: docker
    directory: /backend
    schedule: { interval: monthly }

  - package-ecosystem: docker
    directory: /frontend/apps/erp-admin
    schedule: { interval: monthly }

  - package-ecosystem: docker
    directory: /frontend/apps/pos-terminal
    schedule: { interval: monthly }
