name: frontend

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '20.18.0'
  REGISTRY: ghcr.io

jobs:
  affected:
    name: Lint, test, build (Nx affected)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with: { node-version: ${{ env.NODE_VERSION }}, cache: npm, cache-dependency-path: frontend/package-lock.json }

      - run: npm ci --no-audit --fund=false
        if: hashFiles('frontend/package-lock.json') != ''

      - run: npm install --no-audit --fund=false
        if: hashFiles('frontend/package-lock.json') == ''

      - name: Compute Nx base/head SHAs
        uses: nrwl/nx-set-shas@v4

      - run: npx nx format:check
        continue-on-error: true

      - run: npx nx affected -t lint --parallel=3
      - run: npx nx affected -t test --parallel=3 --ci
      - run: npx nx affected -t build --parallel=2 --configuration=production

      - name: Upload admin dist
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: frontend/dist/apps/erp-admin
          retention-days: 7

      - name: Upload pos dist
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: pos-dist
          path: frontend/dist/apps/pos-terminal
          retention-days: 7

  docker-images:
    name: Docker build & push (admin + pos)
    runs-on: ubuntu-latest
    needs: affected
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions: { contents: read, packages: write }
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: erp-admin
            image: minierp-admin
          - app: pos-terminal
            image: minierp-pos
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:latest
          format: sarif
          output: trivy-${{ matrix.app }}.sarif
          severity: CRITICAL,HIGH

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.app }}.sarif
          category: trivy-${{ matrix.app }}
