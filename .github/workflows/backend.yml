name: backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE_NAME: hisaberp-backend
  REGISTRY: ghcr.io

jobs:
  build-test:
    name: Build & test (Java 21)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    # The integration tests (*IT) are NOT Testcontainers — the 'test' profile points at a real
    # Postgres (:5433/hisaberp_test), Redis (:6380) and MinIO (:9000). Provide them here, else the
    # failsafe ITs fail to start a context and `mvn verify` does not actually exercise them.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hisaberp
          POSTGRES_USER: hisaberp
          POSTGRES_PASSWORD: hisaberp
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U hisaberp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Start MinIO (object storage for ITs)
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2024-09-13T20-26-02Z server /data
          for i in $(seq 1 30); do
            curl -fsS http://localhost:9000/minio/health/ready && break || sleep 2
          done

      - name: Provision test DB (runtime role + hisaberp_test, mirrors postgres-init.sh)
        env:
          PGPASSWORD: hisaberp
        run: |
          # Runtime role: NON-superuser / NOBYPASSRLS so the ITs exercise PostgreSQL RLS like prod.
          # Fresh service container each run, so a plain CREATE ROLE is enough (no IF-EXISTS).
          psql -h localhost -p 5433 -U hisaberp -d hisaberp -v ON_ERROR_STOP=1 \
            -c "CREATE ROLE hisaberp_app LOGIN PASSWORD 'hisaberp' NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE;"
          # Test DB owned by the admin role (Liquibase runs as 'hisaberp'); extensions come from
          # changelog 0001, table/sequence grants to hisaberp_app from changelog 0078.
          psql -h localhost -p 5433 -U hisaberp -d hisaberp -v ON_ERROR_STOP=1 \
            -c "CREATE DATABASE hisaberp_test WITH OWNER hisaberp ENCODING 'UTF8' TEMPLATE template0;"
          psql -h localhost -p 5433 -U hisaberp -d hisaberp_test -v ON_ERROR_STOP=1 \
            -c "GRANT CONNECT ON DATABASE hisaberp_test TO hisaberp_app;"

      - name: Build, unit + integration tests
        working-directory: backend
        run: mvn -B -ntp -pl bootstrap -am verify

      - name: Modulith verification report
        if: always()
        working-directory: backend
        run: |
          if [ -d bootstrap/target/spring-modulith-docs ]; then
            tar czf modulith-docs.tgz -C bootstrap/target spring-modulith-docs
          fi

      - name: Upload modulith docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: modulith-docs
          path: backend/modulith-docs.tgz
          if-no-files-found: ignore
          retention-days: 14

      - name: Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/**/target/surefire-reports/**
          retention-days: 14

  vulnerability-scan:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push'
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: maven }
      - name: Dependency-Check
        working-directory: backend
        run: |
          mvn -B -ntp org.owasp:dependency-check-maven:11.1.0:aggregate \
            -DfailBuildOnCVSS=9 \
            -DautoUpdate=false \
            -Dformats=HTML,JSON || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: backend/target/dependency-check-report.*
          retention-days: 30

  docker-image:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend
