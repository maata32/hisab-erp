# Keep native-loading libraries on the BASE classloader so devtools restarts never reload them.
# identity hashes passwords with argon2 (argon2-jvm-nolibs) which loads the system libargon2 via
# JNA (-Djna.library.path=/opt/homebrew/lib). If these landed on the restart classloader, the first
# login after an auto-restart would throw "Native Library libargon2 already loaded in another
# classloader". As Maven jars they default to the base classloader already; this makes it explicit
# and robust to classpath layout changes.
restart.exclude.argon2=/argon2-jvm-nolibs-.*\\.jar
restart.exclude.jna=/jna-.*\\.jar
