spring:
  jpa:
    properties:
      hibernate:
        format_sql: true
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

logging:
  level:
    com.hisaberp: DEBUG
    org.springframework.modulith: INFO

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: '*'

app:
  cors:
    allowed-origins: http://localhost:4200,http://localhost:4201,http://localhost:5173
