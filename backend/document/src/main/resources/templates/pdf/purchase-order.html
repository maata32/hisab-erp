<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; font-size: 11px; color: #222; }
  .page { padding: 30px; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; border-bottom: 2px solid #b45309; padding-bottom: 16px; }
  .logo-block .company-name { font-size: 18px; font-weight: bold; color: #b45309; }
  .doc-title { text-align: right; }
  .doc-title h1 { font-size: 22px; font-weight: bold; color: #b45309; margin-bottom: 4px; }
  .doc-title .doc-number { font-size: 13px; color: #555; }
  .doc-title .doc-date { font-size: 11px; color: #888; margin-top: 2px; }
  .parties { display: flex; justify-content: space-between; margin-bottom: 20px; }
  .party-block { width: 48%; }
  .party-block .party-label { font-size: 9px; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .party-block .party-name { font-size: 13px; font-weight: bold; }
  .party-block .party-detail { color: #555; margin-top: 2px; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  thead tr { background: #b45309; color: white; }
  thead th { padding: 7px 8px; text-align: left; font-size: 10px; font-weight: bold; }
  tbody tr:nth-child(even) { background: #fef3c7; }
  tbody td { padding: 6px 8px; border-bottom: 1px solid #e5e7eb; }
  .text-right { text-align: right; }
  .totals { float: right; width: 260px; }
  .totals td { padding: 4px 8px 12px 8px; }
  .totals .total-row td { font-weight: bold; font-size: 13px; border-top: 2px solid #b45309; padding-top: 12px; padding-bottom: 4px; }
  .footer { margin-top: 16px; border-top: 1px solid #e5e7eb; padding-top: 8px; text-align: center; font-size: 9px; color: #aaa; clear: both; }
  .notes { margin-top: 16px; font-size: 10px; color: #555; }
  .clearfix::after { content: ""; display: table; clear: both; }
</style>
<style th:if="${paperSize == 'A5'}">.page { padding: 14px 18px; }</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="logo-block">
      <div class="company-name" th:text="${orgName}">Mini-ERP</div>
      <div th:if="${!#strings.isEmpty(orgAddress)}" style="color:#555;font-size:10px;" th:text="${orgAddress}"></div>
      <div th:if="${!#strings.isEmpty(orgPhone)}" style="color:#555;font-size:10px;">Tél. <span th:text="${orgPhone}"></span></div>
      <div th:if="${!#strings.isEmpty(orgEmail)}" style="color:#555;font-size:10px;" th:text="${orgEmail}"></div>
    </div>
    <div class="doc-title">
      <h1>COMMANDE FOURNISSEUR</h1>
      <div class="doc-number" th:text="${order.number}">PO-2026-00001</div>
      <div class="doc-date">Date : <span th:text="${#temporals.format(order.orderDate,'dd/MM/yyyy')}"></span></div>
      <div class="doc-date" th:if="${order.expectedDate}">Livraison prévue : <span th:text="${#temporals.format(order.expectedDate,'dd/MM/yyyy')}"></span></div>
      <div class="doc-date" th:text="${'Statut : ' + order.statusLabel}"></div>
    </div>
  </div>

  <div class="parties">
    <div class="party-block">
      <div class="party-label">Acheteur</div>
      <div class="party-name" th:text="${orgName}"></div>
      <div class="party-detail" th:if="${!#strings.isEmpty(orgAddress)}" th:text="${orgAddress}"></div>
      <div class="party-detail" th:if="${!#strings.isEmpty(orgPhone)}">Tél. <span th:text="${orgPhone}"></span></div>
      <div class="party-detail" th:if="${!#strings.isEmpty(orgEmail)}" th:text="${orgEmail}"></div>
    </div>
    <div class="party-block" style="text-align:right;">
      <div class="party-label">Fournisseur</div>
      <div class="party-name" th:text="${supplier.name}"></div>
      <div class="party-detail" th:text="${supplier.code}"></div>
      <div class="party-detail" th:text="${supplier.phone}"></div>
      <div class="party-detail" th:text="${supplier.email}"></div>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Description</th>
        <th>Réf.</th>
        <th class="text-right">Qté</th>
        <th class="text-right">Reçu</th>
        <th class="text-right">P.U. HT</th>
        <th class="text-right">TVA</th>
        <th class="text-right">Total HT</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="line, stat : ${order.lines}">
        <td th:text="${stat.index + 1}"></td>
        <td th:text="${line.productName}"></td>
        <td th:text="${line.sku}"></td>
        <td class="text-right" th:text="${qty.format(line.quantity)}"></td>
        <td class="text-right" th:text="${qty.format(line.quantityReceived)}"></td>
        <td class="text-right" th:text="${#numbers.formatDecimal(line.unitCost,1,decimals)}"></td>
        <td class="text-right" th:text="${#numbers.formatDecimal(line.taxRate * 100,1,0) + '%'}"></td>
        <td class="text-right" th:text="${#numbers.formatDecimal(line.lineTotal,1,decimals)}"></td>
      </tr>
    </tbody>
  </table>

  <div class="clearfix">
    <div class="totals">
      <table>
        <tr>
          <td>Sous-total HT</td>
          <td class="text-right" th:text="${#numbers.formatDecimal(order.subtotal,1,decimals)}"></td>
        </tr>
        <tr th:if="${order.taxAmount > 0}">
          <td>TVA</td>
          <td class="text-right" th:text="${#numbers.formatDecimal(order.taxAmount,1,decimals)}"></td>
        </tr>
        <tr class="total-row">
          <td>TOTAL TTC</td>
          <td class="text-right" th:text="${order.currency + ' ' + #numbers.formatDecimal(order.total,1,decimals)}"></td>
        </tr>
      </table>
    </div>
  </div>

  <div class="notes" th:if="${order.notes}">
    <strong>Notes :</strong> <span th:text="${order.notes}"></span>
  </div>

  <div class="footer">
    <span th:text="${orgName}"></span><span th:if="${!#strings.isEmpty(orgAddress)}"> — <span th:text="${orgAddress}"></span></span><span th:if="${!#strings.isEmpty(orgPhone)}"> — Tél. <span th:text="${orgPhone}"></span></span><span th:if="${!#strings.isEmpty(orgEmail)}"> — <span th:text="${orgEmail}"></span></span>
  </div>
</div>
</body>
</html>
