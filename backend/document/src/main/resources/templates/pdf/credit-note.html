<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; font-size: 11px; color: #222; }
  .page { padding: 30px; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; border-bottom: 2px solid #b91c1c; padding-bottom: 16px; }
  .logo-block img { max-height: 60px; max-width: 160px; }
  .logo-block .company-name { font-size: 18px; font-weight: bold; color: #b91c1c; }
  .doc-title { text-align: right; }
  .doc-title h1 { font-size: 22px; font-weight: bold; color: #b91c1c; margin-bottom: 4px; }
  .doc-title .doc-number { font-size: 13px; color: #555; }
  .doc-title .doc-date { font-size: 11px; color: #888; margin-top: 2px; }
  .parties { display: flex; justify-content: space-between; margin-bottom: 20px; }
  .party-block { width: 100%; text-align: right; }
  .party-block .party-label { font-size: 9px; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .party-block .party-name { font-size: 13px; font-weight: bold; }
  .party-block .party-detail { color: #555; margin-top: 2px; }
  .reason { background: #fef2f2; border-left: 3px solid #b91c1c; padding: 8px 12px; margin-bottom: 16px; font-size: 11px; color: #7f1d1d; }
  .reason strong { color: #b91c1c; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  thead tr { background: #b91c1c; color: white; }
  thead th { padding: 7px 8px; text-align: left; font-size: 10px; font-weight: bold; }
  tbody tr:nth-child(even) { background: #fef2f2; }
  tbody td { padding: 6px 8px; border-bottom: 1px solid #e5e7eb; }
  .text-right { text-align: right; }
  .totals { float: right; width: 260px; }
  .totals td { padding: 4px 8px 12px 8px; }
  .totals .total-row td { font-weight: bold; font-size: 13px; border-top: 2px solid #b91c1c; padding-top: 12px; padding-bottom: 4px; color: #b91c1c; }
  .footer { margin-top: 16px; border-top: 1px solid #e5e7eb; padding-top: 8px; text-align: center; font-size: 9px; color: #aaa; clear: both; }
  .clearfix::after { content: ""; display: table; clear: both; }
</style>
<style th:if="${paperSize == 'A5'}">.page { padding: 14px 18px; }</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="logo-block">
      <img th:if="${!#strings.isEmpty(logoUrl)}" th:src="${logoUrl}" alt="Logo"/>
      <div th:if="${#strings.isEmpty(logoUrl)}" class="company-name" th:text="${orgName}">Hisab ERP</div>
      <div th:if="${!#strings.isEmpty(logoUrl)}" style="margin-top:4px;font-weight:bold;" th:text="${orgName}"></div>
      <div th:if="${!#strings.isEmpty(orgAddress)}" style="color:#555;font-size:10px;" th:text="${orgAddress}"></div>
      <div th:if="${!#strings.isEmpty(orgPhone)}" style="color:#555;font-size:10px;">Tél. <span th:text="${orgPhone}"></span></div>
      <div th:if="${!#strings.isEmpty(orgEmail)}" style="color:#555;font-size:10px;" th:text="${orgEmail}"></div>
    </div>
    <div class="doc-title">
      <h1>AVOIR</h1>
      <div class="doc-number" th:text="${creditNote.number}">NC-2026-00001</div>
      <div class="doc-date">Date : <span th:text="${#temporals.format(creditNote.issueDate,'dd/MM/yyyy')}"></span></div>
      <div class="doc-date" th:if="${!#strings.isEmpty(creditNote.invoiceNumber)}">
        Réf. facture : <span th:text="${creditNote.invoiceNumber}"></span>
      </div>
    </div>
  </div>

  <!-- Recipient -->
  <div class="parties" style="margin-bottom:12px;">
    <div class="party-block">
      <div class="party-label">Avoir à</div>
      <div class="party-name" th:text="${customer.name}"></div>
      <div class="party-detail" th:if="${!#strings.isEmpty(customer.address)}" th:text="${customer.address}"></div>
      <div class="party-detail" th:if="${!#strings.isEmpty(customer.phone)}" th:text="${customer.phone}"></div>
      <div class="party-detail" th:if="${!#strings.isEmpty(customer.email)}" th:text="${customer.email}"></div>
    </div>
  </div>

  <!-- Reason -->
  <div class="reason" th:if="${!#strings.isEmpty(creditNote.reason)}">
    <strong>Motif :</strong> <span th:text="${creditNote.reason}"></span>
  </div>

  <!-- Lines -->
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Description</th>
        <th>Réf.</th>
        <th class="text-right">Qté</th>
        <th class="text-right">P.U. HT</th>
        <th class="text-right">Remise</th>
        <th class="text-right" th:if="${taxEnabled}">TVA</th>
        <th class="text-right">Total HT</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="line, stat : ${creditNote.lines}">
        <td th:text="${stat.index + 1}"></td>
        <td th:text="${line.productName}"></td>
        <td th:text="${line.sku}"></td>
        <td class="text-right" th:text="${qty.format(line.quantity)}"></td>
        <td class="text-right" th:text="${#numbers.formatDecimal(line.unitPrice,1,decimals)}"></td>
        <td class="text-right" th:text="${line.discountPercent > 0 ? #numbers.formatDecimal(line.discountPercent,1,1) + '%' : '-'}"></td>
        <td class="text-right" th:if="${taxEnabled}" th:text="${#numbers.formatDecimal(line.taxRate * 100,1,0) + '%'}"></td>
        <td class="text-right" th:text="${#numbers.formatDecimal(line.lineTotal,1,decimals)}"></td>
      </tr>
    </tbody>
  </table>

  <!-- Totals -->
  <div class="clearfix">
    <div class="totals">
      <table>
        <tr>
          <td>Sous-total HT</td>
          <td class="text-right" th:text="${#numbers.formatDecimal(creditNote.subtotal,1,decimals)}"></td>
        </tr>
        <tr th:if="${taxEnabled and creditNote.taxAmount > 0}">
          <td>TVA</td>
          <td class="text-right" th:text="${#numbers.formatDecimal(creditNote.taxAmount,1,decimals)}"></td>
        </tr>
        <tr class="total-row">
          <td th:text="${taxEnabled ? 'TOTAL AVOIR TTC' : 'TOTAL AVOIR'}">TOTAL AVOIR TTC</td>
          <td class="text-right" th:text="${creditNote.currency + ' ' + #numbers.formatDecimal(creditNote.total,1,decimals)}"></td>
        </tr>
      </table>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span th:text="${orgName}"></span><span th:if="${!#strings.isEmpty(orgAddress)}"> — <span th:text="${orgAddress}"></span></span><span th:if="${!#strings.isEmpty(orgPhone)}"> — Tél. <span th:text="${orgPhone}"></span></span><span th:if="${!#strings.isEmpty(orgEmail)}"> — <span th:text="${orgEmail}"></span></span>
  </div>
</div>
</body>
</html>
