<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; font-size: 11px; color: #222; }
  .page { padding: 30px; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; border-bottom: 2px solid #b45309; padding-bottom: 16px; }
  .logo-block img { max-height: 60px; max-width: 160px; }
  .logo-block .company-name { font-size: 18px; font-weight: bold; color: #b45309; }
  .doc-title { text-align: right; }
  .doc-title h1 { font-size: 22px; font-weight: bold; color: #b45309; margin-bottom: 4px; }
  .doc-title .doc-number { font-size: 13px; color: #555; }
  .doc-title .doc-date { font-size: 11px; color: #888; margin-top: 2px; }
  .parties { display: flex; justify-content: space-between; margin-bottom: 20px; }
  .party-block { width: 48%; }
  .party-block .party-label { font-size: 9px; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .party-block .party-name { font-size: 13px; font-weight: bold; }
  .party-block .party-detail { color: #555; margin-top: 2px; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  thead tr { background: #b45309; color: white; }
  thead th { padding: 7px 8px; text-align: left; font-size: 10px; font-weight: bold; }
  tbody tr:nth-child(even) { background: #fef3c7; }
  tbody td { padding: 6px 8px; border-bottom: 1px solid #e5e7eb; }
  .text-right { text-align: right; }
  .text-center { text-align: center; }
  .status-badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; }
  .notes { margin-top: 16px; font-size: 10px; color: #555; }
  .signature-block { margin-top: 40px; display: flex; justify-content: space-between; }
  .sig-box { width: 45%; border-top: 1px solid #555; padding-top: 6px; text-align: center; font-size: 10px; color: #555; }
  .footer { margin-top: 16px; border-top: 1px solid #e5e7eb; padding-top: 8px; text-align: center; font-size: 9px; color: #aaa; clear: both; }
</style>
<style th:if="${paperSize == 'A5'}">.page { padding: 14px 18px; }</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="logo-block">
      <img th:if="${!#strings.isEmpty(logoUrl)}" th:src="${logoUrl}" alt="Logo"/>
      <div th:if="${#strings.isEmpty(logoUrl)}" class="company-name" th:text="${orgName}">Mini-ERP</div>
      <div th:if="${!#strings.isEmpty(logoUrl)}" style="margin-top:4px;font-weight:bold;" th:text="${orgName}"></div>
      <div th:if="${!#strings.isEmpty(orgAddress)}" style="color:#555;font-size:10px;" th:text="${orgAddress}"></div>
      <div th:if="${!#strings.isEmpty(orgPhone)}" style="color:#555;font-size:10px;">Tél. <span th:text="${orgPhone}"></span></div>
      <div th:if="${!#strings.isEmpty(orgEmail)}" style="color:#555;font-size:10px;" th:text="${orgEmail}"></div>
    </div>
    <div class="doc-title">
      <h1 th:text="${isReturn} ? 'BON DE RETOUR FOURNISSEUR' : 'BON DE RÉCEPTION'">BON DE RÉCEPTION</h1>
      <div class="doc-number" th:text="${receipt.number}"></div>
      <div class="doc-date">Date prévue : <span th:text="${receipt.scheduledDate != null ? #temporals.format(receipt.scheduledDate,'dd/MM/yyyy') : 'N/A'}"></span></div>
      <div class="doc-date" th:if="${receipt.receivedAt}"
           th:style="${isReturn} ? 'color:#b91c1c;font-weight:bold;' : null">
        <span th:text="${isReturn} ? 'Retourné le : ' : 'Reçu le : '">Reçu le : </span>
        <span th:text="${#temporals.format(receipt.receivedAt,'dd/MM/yyyy')}"></span>
      </div>
    </div>
  </div>

  <!-- Parties -->
  <div class="parties" style="margin-bottom:12px;">
    <div class="party-block" style="width:100%;text-align:right;">
      <div class="party-label">Fournisseur</div>
      <div class="party-name" th:text="${supplier.name}"></div>
      <div class="party-detail" th:if="${!#strings.isEmpty(supplier.code)}" th:text="${supplier.code}"></div>
      <div class="party-detail" th:if="${!#strings.isEmpty(supplier.phone)}" th:text="${supplier.phone}"></div>
      <div class="party-detail" th:if="${!#strings.isEmpty(supplier.email)}" th:text="${supplier.email}"></div>
    </div>
  </div>

  <!-- Lines -->
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Produit</th>
        <th>Réf.</th>
        <th class="text-right" th:text="${isReturn} ? 'Qté à retourner' : 'Qté attendue'">Qté attendue</th>
        <th class="text-right" th:text="${isReturn} ? 'Qté retournée' : 'Qté reçue'">Qté reçue</th>
        <th class="text-center">Statut</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="line, stat : ${receipt.lines}">
        <td th:text="${stat.index + 1}"></td>
        <td th:text="${line.productName}"></td>
        <td th:text="${line.sku}"></td>
        <td class="text-right" th:text="${qty.format(line.quantityOrdered)}"></td>
        <td class="text-right" th:text="${qty.format(line.quantityReceived)}"></td>
        <td class="text-center">
          <span class="status-badge"
                th:style="${line.quantityReceived >= line.quantityOrdered ? 'background:#dcfce7;color:#166534;' : 'background:#fef9c3;color:#854d0e;'}"
                th:text="${line.quantityReceived >= line.quantityOrdered ? 'Complet' : 'Partiel'}"></span>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- Notes -->
  <div class="notes" th:if="${receipt.notes}">
    <strong>Notes :</strong> <span th:text="${receipt.notes}"></span>
  </div>

  <!-- Signatures -->
  <div class="signature-block">
    <div class="sig-box">Signature du magasinier</div>
    <div class="sig-box">Signature du fournisseur</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span th:text="${orgName}"></span><span th:if="${!#strings.isEmpty(orgAddress)}"> — <span th:text="${orgAddress}"></span></span><span th:if="${!#strings.isEmpty(orgPhone)}"> — Tél. <span th:text="${orgPhone}"></span></span><span th:if="${!#strings.isEmpty(orgEmail)}"> — <span th:text="${orgEmail}"></span></span>
  </div>
</div>
</body>
</html>
