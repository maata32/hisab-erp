<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; font-size: 11px; color: #222; }
  .page { padding: 30px; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; border-bottom: 2px solid #1e40af; padding-bottom: 16px; }
  .logo-block img { max-height: 60px; max-width: 160px; }
  .logo-block .company-name { font-size: 18px; font-weight: bold; color: #1e40af; }
  .doc-title { text-align: right; }
  .doc-title h1 { font-size: 22px; font-weight: bold; color: #1e40af; margin-bottom: 4px; }
  .doc-title .doc-number { font-size: 13px; color: #555; }
  .doc-title .doc-date { font-size: 11px; color: #888; margin-top: 2px; }
  .parties { display: flex; justify-content: space-between; margin-bottom: 20px; }
  .party-block { width: 48%; }
  .party-block .party-label { font-size: 9px; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .party-block .party-name { font-size: 13px; font-weight: bold; }
  .party-block .party-detail { color: #555; margin-top: 2px; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  thead tr { background: #1e40af; color: white; }
  thead th { padding: 7px 8px; text-align: left; font-size: 10px; font-weight: bold; }
  tbody tr:nth-child(even) { background: #f0f4ff; }
  tbody td { padding: 6px 8px; border-bottom: 1px solid #e5e7eb; }
  .text-right { text-align: right; }
  .totals { float: right; width: 260px; }
  .totals table { }
  .totals td { padding: 4px 8px 12px 8px; }
  .totals .total-row td { font-weight: bold; font-size: 13px; border-top: 2px solid #1e40af; padding-top: 12px; padding-bottom: 4px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
  .badge-paid { background: #dcfce7; color: #166534; }
  .badge-partial { background: #fef9c3; color: #854d0e; }
  .badge-unpaid { background: #fee2e2; color: #991b1b; }
  .footer { margin-top: 16px; border-top: 1px solid #e5e7eb; padding-top: 8px; text-align: center; font-size: 9px; color: #aaa; clear: both; }
  .notes { margin-top: 16px; font-size: 10px; color: #555; }
  .clearfix::after { content: ""; display: table; clear: both; }
</style>
<style th:if="${paperSize == 'A5'}">.page { padding: 14px 18px; }</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="logo-block">
      <img th:if="${!#strings.isEmpty(logoUrl)}" th:src="${logoUrl}" alt="Logo"/>
      <div th:if="${#strings.isEmpty(logoUrl)}" class="company-name" th:text="${orgName}">Mini-ERP</div>
      <div th:if="${!#strings.isEmpty(logoUrl)}" style="margin-top:4px;font-weight:bold;" th:text="${orgName}"></div>
      <div th:if="${!#strings.isEmpty(orgAddress)}" style="color:#555;font-size:10px;" th:text="${orgAddress}"></div>
      <div th:if="${!#strings.isEmpty(orgPhone)}" style="color:#555;font-size:10px;">Tél. <span th:text="${orgPhone}"></span></div>
      <div th:if="${!#strings.isEmpty(orgEmail)}" style="color:#555;font-size:10px;" th:text="${orgEmail}"></div>
    </div>
    <div class="doc-title">
      <h1>FACTURE</h1>
      <div class="doc-number" th:text="${invoice.number}">FAC-2026-00001</div>
      <div class="doc-date">Date : <span th:text="${#temporals.format(invoice.issueDate,'dd/MM/yyyy')}"></span></div>
      <div class="doc-date" th:if="${invoice.dueDate}">Échéance : <span th:text="${#temporals.format(invoice.dueDate,'dd/MM/yyyy')}"></span></div>
      <div style="margin-top:6px;">
        <span th:class="${'badge badge-' + #strings.toLowerCase(invoice.paymentStatus)}"
              th:text="${invoice.paymentStatusLabel}">PAYÉE</span>
      </div>
    </div>
  </div>

  <!-- Parties -->
  <div class="parties" style="margin-bottom:12px;">
    <div class="party-block" style="width:100%;text-align:right;">
      <div class="party-label">Facturer à</div>
      <div class="party-name" th:text="${customer.name}"></div>
      <div class="party-detail" th:if="${!#strings.isEmpty(customer.address)}" th:text="${customer.address}"></div>
      <div class="party-detail" th:if="${!#strings.isEmpty(customer.phone)}" th:text="${customer.phone}"></div>
      <div class="party-detail" th:if="${!#strings.isEmpty(customer.email)}" th:text="${customer.email}"></div>
    </div>
  </div>

  <!-- Lines -->
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Description</th>
        <th>Réf.</th>
        <th class="text-right">Qté</th>
        <th class="text-right">P.U. HT</th>
        <th class="text-right">Remise</th>
        <th class="text-right">TVA</th>
        <th class="text-right">Total TTC</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="line, stat : ${invoice.lines}">
        <td th:text="${stat.index + 1}"></td>
        <td th:text="${line.productName}"></td>
        <td th:text="${line.sku}"></td>
        <td class="text-right" th:text="${#numbers.formatDecimal(line.quantity,1,3)}"></td>
        <td class="text-right" th:text="${#numbers.formatDecimal(line.unitPrice,1,decimals)}"></td>
        <td class="text-right" th:text="${line.discountPercent > 0 ? #numbers.formatDecimal(line.discountPercent,1,1) + '%' : '-'}"></td>
        <td class="text-right" th:text="${#numbers.formatDecimal(line.taxRate * 100,1,0) + '%'}"></td>
        <td class="text-right" th:text="${#numbers.formatDecimal(line.lineTotal,1,decimals)}"></td>
      </tr>
    </tbody>
  </table>

  <!-- Totals -->
  <div class="clearfix">
    <div class="totals">
      <table>
        <tr>
          <td>Sous-total HT</td>
          <td class="text-right" th:text="${#numbers.formatDecimal(invoice.subtotal,1,decimals)}"></td>
        </tr>
        <tr th:if="${invoice.discountAmount > 0}">
          <td>Remise</td>
          <td class="text-right" th:text="${'-' + #numbers.formatDecimal(invoice.discountAmount,1,decimals)}"></td>
        </tr>
        <tr th:if="${invoice.taxAmount > 0}">
          <td>TVA</td>
          <td class="text-right" th:text="${#numbers.formatDecimal(invoice.taxAmount,1,decimals)}"></td>
        </tr>
        <tr class="total-row">
          <td>TOTAL TTC</td>
          <td class="text-right" th:text="${invoice.currency + ' ' + #numbers.formatDecimal(invoice.total,1,decimals)}"></td>
        </tr>
        <tr th:if="${invoice.paidAmount > 0}">
          <td style="color:#166534;">Déjà payé</td>
          <td class="text-right" style="color:#166534;" th:text="${#numbers.formatDecimal(invoice.paidAmount,1,decimals)}"></td>
        </tr>
        <tr th:if="${invoice.balance > 0}">
          <td style="color:#991b1b;font-weight:bold;">Reste à payer</td>
          <td class="text-right" style="color:#991b1b;font-weight:bold;" th:text="${invoice.currency + ' ' + #numbers.formatDecimal(invoice.balance,1,decimals)}"></td>
        </tr>
      </table>
    </div>
  </div>

  <!-- Notes -->
  <div class="notes" th:if="${invoice.notes}">
    <strong>Notes :</strong> <span th:text="${invoice.notes}"></span>
  </div>
  <div class="notes" th:if="${invoice.paymentTerms}">
    <strong>Conditions de paiement :</strong> <span th:text="${invoice.paymentTerms}"></span>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span th:text="${orgName}"></span><span th:if="${!#strings.isEmpty(orgAddress)}"> — <span th:text="${orgAddress}"></span></span><span th:if="${!#strings.isEmpty(orgPhone)}"> — Tél. <span th:text="${orgPhone}"></span></span><span th:if="${!#strings.isEmpty(orgEmail)}"> — <span th:text="${orgEmail}"></span></span>
  </div>
</div>
</body>
</html>
