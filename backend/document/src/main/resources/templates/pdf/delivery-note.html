<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; font-size: 11px; color: #222; }
  .page { padding: 30px; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; border-bottom: 2px solid #059669; padding-bottom: 16px; }
  .logo-block .company-name { font-size: 18px; font-weight: bold; color: #059669; }
  .doc-title h1 { font-size: 22px; font-weight: bold; color: #059669; }
  .doc-title { text-align: right; }
  .doc-title .doc-number { font-size: 13px; color: #555; }
  .doc-title .doc-date { font-size: 11px; color: #888; margin-top: 2px; }
  .parties { display: flex; justify-content: space-between; margin-bottom: 20px; }
  .party-block { width: 48%; }
  .party-block .party-label { font-size: 9px; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .party-block .party-name { font-size: 13px; font-weight: bold; }
  .party-block .party-detail { color: #555; margin-top: 2px; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  thead tr { background: #059669; color: white; }
  thead th { padding: 7px 8px; text-align: left; font-size: 10px; font-weight: bold; }
  tbody tr:nth-child(even) { background: #ecfdf5; }
  tbody td { padding: 6px 8px; border-bottom: 1px solid #e5e7eb; }
  .text-right { text-align: right; }
  .text-center { text-align: center; }
  .status-badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; }
  .signature-block { margin-top: 40px; display: flex; justify-content: space-between; }
  .sig-box { width: 45%; border-top: 1px solid #555; padding-top: 6px; text-align: center; font-size: 10px; color: #555; }
  .footer { margin-top: 40px; border-top: 1px solid #e5e7eb; padding-top: 10px; text-align: center; font-size: 9px; color: #aaa; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="logo-block">
      <img th:if="${logoUrl}" th:src="${logoUrl}" alt="Logo" style="max-height:60px;max-width:160px;"/>
      <div th:if="${!logoUrl}" class="company-name" th:text="${orgName}"></div>
      <div style="color:#555;font-size:10px;" th:text="${orgAddress}"></div>
    </div>
    <div class="doc-title">
      <h1>BON DE LIVRAISON</h1>
      <div class="doc-number" th:text="${delivery.number}"></div>
      <div class="doc-date">Date prévue : <span th:text="${delivery.scheduledDate != null ? #temporals.format(delivery.scheduledDate,'dd/MM/yyyy') : 'N/A'}"></span></div>
      <div class="doc-date" th:if="${delivery.deliveredAt}">Livré le : <span th:text="${#temporals.format(delivery.deliveredAt,'dd/MM/yyyy')}"></span></div>
    </div>
  </div>

  <div class="parties">
    <div class="party-block">
      <div class="party-label">Expéditeur</div>
      <div class="party-name" th:text="${orgName}"></div>
      <div class="party-detail" th:text="${orgAddress}"></div>
    </div>
    <div class="party-block" style="text-align:right;">
      <div class="party-label">Destinataire</div>
      <div class="party-name" th:text="${customer.name}"></div>
      <div class="party-detail" th:text="${delivery.address}"></div>
      <div class="party-detail" th:text="${delivery.contactPhone}"></div>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Produit</th>
        <th>Réf.</th>
        <th class="text-right">Qté commandée</th>
        <th class="text-right">Qté livrée</th>
        <th class="text-center">Statut</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="line, stat : ${delivery.lines}">
        <td th:text="${stat.index + 1}"></td>
        <td th:text="${line.productName}"></td>
        <td th:text="${line.sku}"></td>
        <td class="text-right" th:text="${#numbers.formatDecimal(line.quantityOrdered,1,3)}"></td>
        <td class="text-right" th:text="${#numbers.formatDecimal(line.quantityDelivered,1,3)}"></td>
        <td class="text-center">
          <span th:class="${line.quantityDelivered >= line.quantityOrdered ? 'status-badge' : 'status-badge'}"
                th:style="${line.quantityDelivered >= line.quantityOrdered ? 'background:#dcfce7;color:#166534;' : 'background:#fef9c3;color:#854d0e;'}"
                th:text="${line.quantityDelivered >= line.quantityOrdered ? 'Complet' : 'Partiel'}"></span>
        </td>
      </tr>
    </tbody>
  </table>

  <div style="font-size:10px;color:#555;" th:if="${delivery.notes}">
    <strong>Notes :</strong> <span th:text="${delivery.notes}"></span>
  </div>

  <div class="signature-block">
    <div class="sig-box">Signature du livreur</div>
    <div class="sig-box">Signature du destinataire<br/>
      <span th:if="${delivery.signedBy}" th:text="${delivery.signedBy}" style="font-size:9px;"></span>
    </div>
  </div>

  <div class="footer"><span th:text="${orgName}"></span> — Document généré par Mini-ERP</div>
</div>
</body>
</html>
