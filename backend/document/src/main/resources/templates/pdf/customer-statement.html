<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
<meta charset="UTF-8"/>
<title>Relevé de compte</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; font-size: 11px; color: #222; }
  .page { padding: 30px; max-width: 760px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 24px; border-bottom: 2px solid #1e40af; padding-bottom: 16px; }
  .doc-title h1 { font-size: 22px; font-weight: bold; color: #1e40af; }
  .doc-title { text-align: right; }
  .doc-title .doc-date { font-size: 11px; color: #888; margin-top: 2px; }
  .customer-block { background: #f8fafc; border-left: 4px solid #1e40af;
                    padding: 12px 16px; margin-bottom: 20px; }
  .customer-block h2 { font-size: 14px; color: #1e40af; margin-bottom: 6px; }
  .balance-summary { display: flex; gap: 12px; margin: 20px 0; }
  .balance-card { flex: 1; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
                  padding: 12px; text-align: center; }
  .balance-card .label { font-size: 10px; color: #888; text-transform: uppercase;
                         letter-spacing: 1px; }
  .balance-card .value { font-size: 18px; font-weight: bold; color: #1e40af; margin-top: 4px; }
  .balance-card.overdue .value { color: #dc2626; }
  .balance-card.due .value { color: #d97706; }
  h3.section { font-size: 12px; color: #1e40af; text-transform: uppercase;
               letter-spacing: 1px; border-bottom: 1px solid #e5e7eb;
               padding-bottom: 4px; margin: 16px 0 8px; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 6px 8px; background: #f1f5f9; font-size: 10px; text-align: left;
       text-transform: uppercase; letter-spacing: 0.5px; }
  td { padding: 6px 8px; border-bottom: 1px solid #f3f4f6; }
  .text-right { text-align: right; }
  .empty { color: #999; font-style: italic; padding: 8px; }
  .footer { margin-top: 30px; border-top: 1px solid #e5e7eb; padding-top: 10px;
            text-align: center; font-size: 9px; color: #aaa; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div>
      <h2 style="font-size:14px;color:#1e40af;">RELEVÉ DE COMPTE</h2>
    </div>
    <div class="doc-title">
      <h1>Solde</h1>
      <div class="doc-date" th:text="'au ' + ${statementDate}"></div>
    </div>
  </div>

  <div class="customer-block">
    <h2 th:text="${customer.name}"></h2>
    <div th:text="'Code : ' + ${customer.code}"></div>
    <div th:if="${customer.phone}" th:text="'Tél : ' + ${customer.phone}"></div>
    <div th:if="${customer.email}" th:text="'Email : ' + ${customer.email}"></div>
    <div th:if="${customer.address}" th:text="${customer.address}"></div>
  </div>

  <div class="balance-summary">
    <div class="balance-card">
      <div class="label">Total facturé</div>
      <div class="value"
           th:text="${#numbers.formatDecimal(balance.totalInvoiced, 1, 2)} + ' ' + ${currency}"></div>
    </div>
    <div class="balance-card">
      <div class="label">Total réglé</div>
      <div class="value"
           th:text="${#numbers.formatDecimal(balance.totalPaid, 1, 2)} + ' ' + ${currency}"></div>
    </div>
    <div class="balance-card due">
      <div class="label">Solde dû</div>
      <div class="value"
           th:text="${#numbers.formatDecimal(balance.balance, 1, 2)} + ' ' + ${currency}"></div>
    </div>
    <div class="balance-card overdue" th:if="${balance.overdue != null and balance.overdue > 0}">
      <div class="label">En retard</div>
      <div class="value"
           th:text="${#numbers.formatDecimal(balance.overdue, 1, 2)} + ' ' + ${currency}"></div>
    </div>
  </div>

  <div th:if="${!credits.isEmpty()}">
    <h3 class="section">Crédits / avances actifs</h3>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Source</th>
          <th class="text-right">Initial</th>
          <th class="text-right">Restant</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="c : ${credits}">
          <td th:text="${#temporals.format(c.createdAt, 'dd/MM/yyyy')}"></td>
          <td th:text="${c.source}"></td>
          <td class="text-right"
              th:text="${#numbers.formatDecimal(c.initialAmount, 1, 2)} + ' ' + ${currency}"></td>
          <td class="text-right"
              th:text="${#numbers.formatDecimal(c.remainingAmount, 1, 2)} + ' ' + ${currency}"></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div th:if="${credits.isEmpty()}">
    <div class="empty">Aucun crédit actif.</div>
  </div>

  <div class="footer">
    <div th:text="'Dernier paiement : ' + (${balance.lastPaymentDate} ?: 'aucun')"></div>
    <div>Document généré automatiquement — Mini-ERP</div>
  </div>
</div>
</body>
</html>
