# Hisab ERP — local development stack
# Run from the repo root:
#   make dev-up      OR   docker compose -f infra/docker/dev/docker-compose.yml up -d
#
# Services exposed on localhost:
#   Backend         http://localhost:8080
#   Admin frontend  http://localhost:4200      (or proxied by Nx dev server during `npm start`)
#   POS frontend    http://localhost:4201
#   Postgres        localhost:5433    (user: hisaberp / pwd: hisaberp / db: hisaberp)  -- 5433 to avoid clashing with a host PG on 5432
#   Redis           localhost:6380    -- 6380 to avoid clashing with a host Redis on 6379
#   MinIO console   http://localhost:9001      (user: minioadmin / pwd: minioadmin)
#   Mailpit UI      http://localhost:8025

name: hisaberp-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: hisaberp-postgres
    environment:
      POSTGRES_DB: hisaberp
      POSTGRES_USER: hisaberp
      POSTGRES_PASSWORD: hisaberp
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../../scripts/postgres-init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "hisaberp", "-d", "hisaberp"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hisaberp-redis
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: hisaberp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: hisaberp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/hisaberp-documents || true &&
      mc mb -p local/hisaberp-uploads   || true &&
      mc anonymous set none     local/hisaberp-documents &&
      mc anonymous set download local/hisaberp-uploads &&
      echo 'MinIO buckets ready';
      "
    restart: "no"

  mailhog:
    image: axllent/mailpit:v1.21
    container_name: hisaberp-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  backend:
    build:
      context: ../../../backend
      dockerfile: Dockerfile
    container_name: hisaberp-backend
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      minio:    { condition: service_healthy }
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hisaberp
      # Runtime pool uses the restricted NOSUPERUSER/NOBYPASSRLS role so PostgreSQL RLS
      # (defense layer 2) actually applies. Liquibase runs as the owner role below.
      SPRING_DATASOURCE_USERNAME: hisaberp_app
      SPRING_DATASOURCE_PASSWORD: hisaberp
      SPRING_LIQUIBASE_URL: jdbc:postgresql://postgres:5432/hisaberp
      SPRING_LIQUIBASE_USER: hisaberp
      SPRING_LIQUIBASE_PASSWORD: hisaberp
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: DEV_SECRET_AT_LEAST_32_CHARACTERS_LONG_FOR_HS256_OK
      JWT_ACCESS_TTL: PT60M
      APP_CORS_ALLOWED_ORIGINS: http://localhost:4200,http://localhost:4201
      APP_PUBLIC_URL: http://localhost:8080
      MAIL_HOST: mailhog
      MAIL_PORT: "1025"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: hisaberp-uploads
      JAVA_OPTS: "-Xmx768m -XX:+UseG1GC"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  admin:
    build:
      context: ../../../frontend
      dockerfile: apps/erp-admin/Dockerfile
    container_name: hisaberp-admin
    depends_on:
      backend: { condition: service_healthy }
    ports:
      - "4200:80"
    restart: unless-stopped

  pos:
    build:
      context: ../../../frontend
      dockerfile: apps/pos-terminal/Dockerfile
    container_name: hisaberp-pos
    depends_on:
      backend: { condition: service_healthy }
    ports:
      - "4201:80"
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
