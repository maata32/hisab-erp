global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: prod
    app: mini-erp

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['backend:8080']

  - job_name: traefik
    static_configs:
      - targets: ['traefik:8082']
